# Single source of truth for experiment/report constants.
# Read by:
# 1) experiment code (optional, by import/parse)
# 2) scripts/generate_report_macros.py -> REPORT/generated/report_values.tex

report:
  validation_split_pct: 10
  seed_list: [42, 43, 44]
  bo:
    total_candidates: 12
    init_random: 4
    guided: 8
  training:
    max_epochs: 150
    learning_rate: 0.001
    batch_size: 256
  metrics:
    target_tau_pct: 90.0
  dataset:
    mnist_train_size: 60000
    mnist_test_size: 10000

experiments:
  mnist_fcn_regscomp:
    base_plain:
      gpu: "6"
      epochs: 150
      lr: 0.001
      model: small_fcn
      dataset: mnist
      batchsize: 256
      l2_weight: 0.0
      order: 2
      seed: 42
      do_neural_balance: false
      neural_balance_epoch: 1
      full_balance_at_start: false
      train_data_frac: 1.0
      reverse_balance_layer_order: false
      activation: relu
      tanh_on_output: false
      lr_scheduler: none
      scheduler_step_size: 30
      scheduler_gamma: 0.1
      target_tau: 90.0

    meta_bo_l2:
      base_config_path: configs/mnist_fcn_regscomp/plain.yaml
      validation_split_pct: 10
      seeds: [42, 43, 44]
      objective: mean_final_val_acc_pct
      runtime:
        parallel_seeds: 3
        gpu_pool: ["0", "1", "2"]
      bo:
        total_candidates: 12
        init_random: 4
        guided: 8
        acquisition_samples: 2048
        seed: 1234
        xi: 0.01
      static_overrides:
        order: 2
        do_neural_balance: false
        full_balance_at_start: false
      search_space:
        - name: l2_weight
          type: float
          low: 1.0e-5
          high: 3.0e-3
          log_scale: true
