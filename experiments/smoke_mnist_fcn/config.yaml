# Smoke run: tiny budget for a quick sanity check (paths resolved by launch_from_config).
# Run from repo root:  python -m src.experiments.mnist_fcn.launch_from_config experiments/smoke_mnist_fcn
#
# Metrics: logs/train.csv (per epoch) and logs/summary.json (table-aligned aggregates).
# Optional: target_tau (default 95), summary_json path.

gpu: "6"

epochs: 2
lr: 0.001
model: small_fcn
dataset: mnist
batchsize: 256
l2_weight: 0.0
seed: 0
do_neural_balance: false
neural_balance_epoch: 1  # Ignored when do_neural_balance is false.
order: 2
full_balance_at_start: false
train_data_frac: 1.0
reverse_balance_layer_order: false

activation: relu
tanh_on_output: false
lr_scheduler: none
scheduler_step_size: 30
scheduler_gamma: 0.1
