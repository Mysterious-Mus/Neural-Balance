base_config_path: configs/mnist_fcn_regscomp/plain.yaml
validation_split_pct: 10
seeds:
- 42
- 43
- 44
objective: mean_final_val_acc_pct
runtime:
  parallel_seeds: 3
  gpu_pool:
  - '0'
  - '1'
  - '2'
bo:
  total_candidates: 12
  init_random: 4
  guided: 8
  acquisition_samples: 2048
  seed: 1234
  xi: 0.01
static_overrides:
  order: 2
  l2_weight: 0.0
  do_neural_balance: true
  full_balance_at_start: false
search_space:
- name: neural_balance_epoch
  type: int
  low: 1
  high: 12
  log_scale: false
base_config:
  gpu: '6'
  epochs: 150
  lr: 0.001
  model: small_fcn
  dataset: mnist
  batchsize: 256
  l2_weight: 0.0
  order: 2
  seed: 42
  do_neural_balance: false
  neural_balance_epoch: 1
  full_balance_at_start: false
  train_data_frac: 1.0
  reverse_balance_layer_order: false
  activation: relu
  tanh_on_output: false
  lr_scheduler: none
  scheduler_step_size: 30
  scheduler_gamma: 0.1
  target_tau: 90.0
